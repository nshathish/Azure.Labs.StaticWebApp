name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            10.x

      - name: Publish client
        run: dotnet publish Labs.StaticWebApp.Client/Labs.StaticWebApp.Client.csproj -c Release -o .publish/client

      - name: Publish API
        run: dotnet publish Labs.StaticWebApp.Api/Labs.StaticWebApp.Api.csproj -c Release -o .publish/api

      - uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: .publish/client/wwwroot
          api_location: .publish/api
          skip_app_build: true
          skip_api_build: true
